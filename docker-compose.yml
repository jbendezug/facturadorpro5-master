services:

  # ─────────────────────────────────────────
  # PHP-FPM Application
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: facturador_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-tenancy}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - facturador_net

  # ─────────────────────────────────────────
  # Nginx Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: facturador_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - facturador_net

  # ─────────────────────────────────────────
  # MySQL 8.0  (prueba de compatibilidad)
  # NOTA: usa volumen mysql8_data (independiente del 5.7)
  # Para migrar datos del 5.7 ver instrucciones en README
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: facturador_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-tenancy}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"          # 3307 en host para no chocar con MySQL local
    volumes:
      - mysql8_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - facturador_net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: facturador_redis
    restart: unless-stopped
    ports:
      - "6380:6379"          # 6380 en host para no chocar con Redis local
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - facturador_net

  # ─────────────────────────────────────────
  # Queue Worker  (Laravel queue:work)
  # ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: facturador_queue
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: []                  # omite el entrypoint de setup
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-tenancy}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - SKIP_SETUP=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - facturador_net

# ─────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local          # datos MySQL 5.7 originales (conservados)
  mysql8_data:
    driver: local          # datos MySQL 8.0 para prueba
  redis_data:
    driver: local

networks:
  facturador_net:
    driver: bridge
