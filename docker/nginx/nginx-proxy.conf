# =============================================================================
# Configuración de Nginx del HOST  (el que ya tienes instalado en tu servidor)
# =============================================================================
# Copia este archivo a:  /etc/nginx/sites-available/facturadorpro5
# Luego haz:
#   sudo ln -s /etc/nginx/sites-available/facturadorpro5 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para SSL con Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d tudominio.com -d www.tudominio.com
# =============================================================================

# Redirección HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com www.tudominio.com;

    # Descomenta si usas certbot (mantendrá el challenge)
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    return 301 https://$host$request_uri;
}

# HTTPS – Proxy inverso hacia el Nginx interno de Docker (127.0.0.1:8080)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # ── Certificados SSL (generados por certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Cabeceras de seguridad ──────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Límite de subida (facturas, PDFs) ───────────────────────────────────
    client_max_body_size 100M;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/facturadorpro5_access.log;
    error_log  /var/log/nginx/facturadorpro5_error.log;

    # ── Reverse Proxy al contenedor Nginx interno ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }
}
